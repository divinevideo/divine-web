# ABOUTME: GitHub Actions workflow for deploying to Fastly (primary) and Cloudflare Pages (backup)
# ABOUTME: Triggers on push to main branch

name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-fastly:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: compute-js/package-lock.json

      - name: Install Fastly CLI
        run: npm install -g @fastly/cli

      - name: Install Fastly compute dependencies
        working-directory: compute-js
        run: npm ci

      - name: Deploy to Fastly Compute (edge worker)
        working-directory: compute-js
        env:
          FASTLY_API_TOKEN: ${{ secrets.FASTLY_API_TOKEN }}
        run: fastly compute publish --non-interactive --token=$FASTLY_API_TOKEN

      - name: Publish static content to KV Store
        working-directory: compute-js
        env:
          FASTLY_API_TOKEN: ${{ secrets.FASTLY_API_TOKEN }}
        run: npx @fastly/compute-js-static-publish publish-content

      - name: Verify live .well-known endpoints
        run: |
          set -euo pipefail

          check_json_endpoint() {
            url="$1"
            headers="$(curl -fsSI "$url")"
            printf '%s\n' "$headers"

            status="$(printf '%s\n' "$headers" | awk 'tolower($1) ~ /^http/ {print $2; exit}')"
            content_type="$(printf '%s\n' "$headers" | awk -F': ' 'tolower($1) == "content-type" {print tolower($2); exit}' | tr -d '\r')"

            if [ "$status" != "200" ]; then
              echo "Expected 200 from $url but got $status" >&2
              exit 1
            fi

            case "$content_type" in
              application/json*|application/pkcs7-mime*)
                ;;
              *)
                echo "Expected JSON content-type from $url but got $content_type" >&2
                exit 1
                ;;
            esac
          }

          check_json_endpoint "https://divine.video/.well-known/apple-app-site-association"
          check_json_endpoint "https://www.divine.video/.well-known/apple-app-site-association"
          check_json_endpoint "https://divine.video/.well-known/assetlinks.json"
          check_json_endpoint "https://www.divine.video/.well-known/assetlinks.json"

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages (backup)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=divine-web-direct-deploy --branch=main
